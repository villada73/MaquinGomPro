<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Logo completo sin fondo -->
  <!-- Dos círculos interconectados (isotipo) -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="#1e3a8a" stroke-width="10"/>
  <circle cx="100" cy="100" r="38" fill="none" stroke="#1e3a8a" stroke-width="4"/>
  <circle cx="100" cy="100" r="18" fill="none" stroke="#f59e0b" stroke-width="2"/>
  
  <circle cx="200" cy="100" r="55" fill="none" stroke="#1e3a8a" stroke-width="10"/>
  <circle cx="200" cy="100" r="38" fill="none" stroke="#1e3a8a" stroke-width="4"/>
  <circle cx="200" cy="100" r="18" fill="none" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- Unión central -->
  <circle cx="150" cy="100" r="25" fill="#1e3a8a"/>
  
  <!-- MAQUIN GOM -->
  <text x="150" y="165" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1e3a8a" text-anchor="middle" letter-spacing="2">MAQUIN GOM</text>
  <!-- PRO -->
  <text x="150" y="190" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f59e0b" text-anchor="middle" letter-spacing="12">PRO</text>
</svg>