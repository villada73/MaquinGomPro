<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Background -->
  <rect width="400" height="200" fill="white"/>
  
  <!-- Left circle (neumático) -->
  <circle cx="130" cy="80" r="55" fill="none" stroke="#1e3a8a" stroke-width="10"/>
  <circle cx="130" cy="80" r="38" fill="none" stroke="#1e3a8a" stroke-width="4"/>
  <circle cx="130" cy="80" r="18" fill="none" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- Right circle (neumático) -->
  <circle cx="230" cy="80" r="55" fill="none" stroke="#1e3a8a" stroke-width="10"/>
  <circle cx="230" cy="80" r="38" fill="none" stroke="#1e3a8a" stroke-width="4"/>
  <circle cx="230" cy="80" r="18" fill="none" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- Connection at center (link effect) -->
  <circle cx="180" cy="80" r="25" fill="#1e3a8a"/>
  
  <!-- MAQUIN GOM text -->
  <text x="180" y="150" 
        font-family="Arial, sans-serif" 
        font-size="28" 
        font-weight="bold" 
        fill="#1e3a8a" 
        text-anchor="middle"
        letter-spacing="3">MAQUIN GOM</text>
  
  <!-- PRO text - accent -->
  <text x="180" y="175" 
        font-family="Arial, sans-serif" 
        font-size="20" 
        font-weight="bold" 
        fill="#f59e0b" 
        text-anchor="middle"
        letter-spacing="10">PRO</text>
</svg>